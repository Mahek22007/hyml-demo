<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Brew & Bean Café</title>

    <!-- BOOTSTRAP CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <style>
        body {
            background: #f3ece6;
            font-family: 'Poppins', sans-serif;
        }
        header {
            background: #4a2c2a;
            color: white;
            padding: 25px;
            text-align: center;
            font-size: 32px;
            font-weight: 600;
        }
        .card img {
            height: 180px;
            object-fit: cover;
        }
        .bill-box {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.2);
            position: sticky;
            top: 20px;
        }
        footer {
            background: #4a2c2a;
            color: white;
            padding: 15px;
            text-align: center;
            margin-top: 40px;
        }
    </style>
</head>
<body>

<header>☕ Brew & Bean Café — Order Online</header>

<div class="container mt-4">
    <div class="row g-4">

        <!-- MENU SECTION -->
        <div class="col-lg-8">
            <div class="row g-4">

                <!-- ITEM 1 -->
                <div class="col-md-6 col-xl-4">
                    <div class="card shadow-sm">
                        <img src="https://images.unsplash.com/photo-1511920170033-f8396924c348" class="card-img-top">
                        <div class="card-body">
                            <h5 class="card-title">Classic Cappuccino</h5>
                            <p class="text-muted">₹140</p>
                            <button class="btn btn-primary w-100" onclick="addItem('Classic Cappuccino',140)">Add to Cart</button>
                        </div>
                    </div>
                </div>

                <!-- ITEM 2 -->
                <div class="col-md-6 col-xl-4">
                    <div class="card shadow-sm">
                        <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93" class="card-img-top">
                        <div class="card-body">
                            <h5 class="card-title">Vanilla Latte</h5>
                            <p class="text-muted">₹160</p>
                            <button class="btn btn-primary w-100" onclick="addItem('Vanilla Latte',160)">Add to Cart</button>
                        </div>
                    </div>
                </div>

                <!-- ITEM 3 -->
                <div class="col-md-6 col-xl-4">
                    <div class="card shadow-sm">
                        <img src="https://images.unsplash.com/photo-1517701604599-bb29b565090c" class="card-img-top">
                        <div class="card-body">
                            <h5 class="card-title">Mocha Chocolate</h5>
                            <p class="text-muted">₹180</p>
                            <button class="btn btn-primary w-100" onclick="addItem('Mocha Chocolate',180)">Add to Cart</button>
                        </div>
                    </div>
                </div>

                <!-- ITEM 4 -->
                <div class="col-md-6 col-xl-4">
                    <div class="card shadow-sm">
                        <img src="https://images.unsplash.com/photo-1464305795204-6f5bbfc7fb81" class="card-img-top">
                        <div class="card-body">
                            <h5 class="card-title">Iced Caramel Coffee</h5>
                            <p class="text-muted">₹170</p>
                            <button class="btn btn-primary w-100" onclick="addItem('Iced Caramel Coffee',170)">Add to Cart</button>
                        </div>
                    </div>
                </div>

                <!-- ITEM 5 -->
                <div class="col-md-6 col-xl-4">
                    <div class="card shadow-sm">
                        <img src="https://images.unsplash.com/photo-1551024506-0bccd828d307" class="card-img-top">
                        <div class="card-body">
                            <h5 class="card-title">Fresh Croissant</h5>
                            <p class="text-muted">₹90</p>
                            <button class="btn btn-primary w-100" onclick="addItem('Fresh Croissant',90)">Add to Cart</button>
                        </div>
                    </div>
                </div>

                <!-- ITEM 6 -->
                <div class="col-md-6 col-xl-4">
                    <div class="card shadow-sm">
                        <img src="https://images.unsplash.com/photo-1606313564200-e75d5e30476c" class="card-img-top">
                        <div class="card-body">
                            <h5 class="card-title">Chocolate Brownie</h5>
                            <p class="text-muted">₹110</p>
                            <button class="btn btn-primary w-100" onclick="addItem('Chocolate Brownie',110)">Add to Cart</button>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <!-- BILLING SECTION -->
        <div class="col-lg-4">
            <div class="bill-box">
                <h4 class="mb-3">🧾 Your Order</h4>
                <div id="bill-items"></div>
                <hr>
                <h5>Total: ₹<span id="total">0</span></h5>
                <button class="btn btn-dark w-100 mt-3" onclick="placeOrder()">Place Order</button>
            </div>
        </div>

    </div>
</div>

<footer>
    © Brew & Bean Café | Crafted with Love ☕
</footer>

<!-- JS BILLING LOGIC -->
<script>
    let total = 0;
    let items = [];

    function addItem(name, price) {
        total += price;
        items.push(`${name} - ₹${price}`);

        let bill = document.getElementById("bill-items");
        let div = document.createElement("div");
        div.className = "d-flex justify-content-between border-bottom pb-1 mb-2";
        div.innerHTML = `<span>${name}</span><span>₹${price}</span>`;
        bill.appendChild(div);

        document.getElementById("total").innerText = total;
    }

    function placeOrder() {
        if (items.length === 0) {
            alert("Your cart is empty!");
            return;
        }

        alert(
            "ORDER PLACED SUCCESSFULLY!\n\n" +
            items.join("\n") +
            "\n\nTOTAL: ₹" + total
        );

        document.getElementById("bill-items").innerHTML = "";
        document.getElementById("total").innerText = 0;
        items = [];
        total = 0;
    }
</script>

</body>
</html>
