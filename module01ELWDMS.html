<!DOCTYPE html>
<html>
<head>
    <title>Brew & Bean Basic</title>
</head>
<body>

<h1>Brew & Bean Café</h1>

<table border="1" cellpadding="10">
    <tr>
        <th colspan="2">Coffee Order Form</th>
    </tr>

    <tr>
        <td>Select Coffee</td>
        <td>
            <select>
                <option>Espresso</option>
                <option>Cappuccino</option>
                <option>Latte</option>
            </select>
        </td>
    </tr>

    <tr>
        <td>Quantity</td>
        <td><input type="number" value="1"></td>
    </tr>

    <tr>
        <td>Add-ons</td>
        <td>
            <input type="checkbox"> Sugar<br>
            <input type="checkbox"> Milk<br>
            <input type="checkbox"> Chocolate
        </td>
    </tr>

    <tr>
        <td colspan="2" align="center">
            <button>Submit Order</button>
        </td>
    </tr>
</table>

</body>
</html>
