<!DOCTYPE html>
<html>
<head>
    <title>Brew & Bean Basic</title>

    <style>
        body {
            background: #f9f4ef;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #5a381e;
            margin-bottom: 25px;
        }

        table {
            margin: auto;
            background: white;
            border-collapse: collapse;
            width: 350px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            border-radius: 8px;
            overflow: hidden;
        }

        th {
            background: #5a381e;
            color: white;
            padding: 12px;
            font-size: 18px;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        select, input[type="number"] {
            width: 100%;
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            background: #5a381e;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #3d2615;
        }
    </style>

</head>
<body>

<h1>Brew & Bean Café</h1>

<table border="1" cellpadding="10">
    <tr>
        <th colspan="2">Coffee Order Form</th>
    </tr>

    <tr>
        <td>Select Coffee</td>
        <td>
            <select>
                <option>Espresso</option>
                <option>Cappuccino</option>
                <option>Latte</option>
            </select>
        </td>
    </tr>

    <tr>
        <td>Quantity</td>
        <td><input type="number" value="1"></td>
    </tr>

    <tr>
        <td>Add-ons</td>
        <td>
            <input type="checkbox"> Sugar<br>
            <input type="checkbox"> Milk<br>
            <input type="checkbox"> Chocolate
        </td>
    </tr>

    <tr>
        <td colspan="2" align="center">
            <button>Submit Order</button>
        </td>
    </tr>
</table>

</body>
</html>
